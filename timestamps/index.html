<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeitstempel Manager</title>

  <style>
    :root {
      --color-bg-main: #31062f;
      --color-bg-card: #41083d;
      --color-bg-input: #ffffff;

      --color-text-primary: #ffffff;
      --color-accent-primary: #a31690;
      --color-accent-secondary: #f9a8d4;

      --color-danger: #db1843;

      --color-grid-btn: #8f8f8fd0;

      --bg-text-area: #220b1e;
      
      --text-text-area: #ffffff;

      --grid-item-bg: #ffffff1a;

      --shadow-glow: #155adbaa;

      --ticket_color-1: #6BAED6;
      --ticket_color-2: #5CC8A1;
      --ticket_color-3: #A3B18A;
      --ticket_color-4: #4CC9F0;
      --ticket_color-5: #F28482;
      --ticket_color-6: #C77DFF;
      --ticket_color-7: #F9C74F;
      --ticket_color-8: #F8961E;        
    }

    body {
      margin: 0;
      font-family: system-ui;
      background: var(--color-bg-main);
      color: var(--color-text-primary);
      padding: 1rem;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
               Roboto, Helvetica, Arial, sans-serif;
    }

    #list {
      margin-top: 1rem;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      display: flex;

      display: block;
      /*temp pre view change implemented*/

      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .view-select {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      height: fit-content;
      margin-bottom: 0px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.8Silorem;
    }

    .view-select select {
      padding: 0.6rem 0.8rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgb(83, 50, 94);
      color: var(--color-bg-input);
      min-width: 180px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    #viewMode {
      color: rgb(255, 255, 255);
      background: var(--color-bg-card);
      font-size: 1rem;
    }

    .input-row {
      display: flex;
      gap: 0.9rem;
      align-items: center;
      height: 50px;
    }

    input,
    textarea {
      margin: 0.6rem 0;
      background: var(--grid-item-bg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-text-area);
      font-size: 1rem;
      caret-color: #f5f5f5;
      outline: none;
      transition: outline 0.2s ease, border-color 0.2s ease;
    }

    textarea::placeholder {
      color: rgb(255, 255, 255);
      opacity: 1;
      font-size: 0.8rem;
    }

    input {
      flex: 1;
      padding: 0 0.8rem;
      border-radius: 12px;
      outline: 2px solid transparent;
      background: #41083d;
      min-height: 50px;
    }

    input::placeholder,
    textarea::placeholder {
      font-size: 0.8rem;
      opacity: 0.7;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0.5rem 0.7rem;
      cursor: pointer;
      /*background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));*/
      background: var(--color-grid-btn);
      color: rgb(255, 255, 255);
    }

    .delete-btn {
      background: var(--color-danger);
      height: 3rem;
      width: 50px;
      height: 50px;
    }

    .archive-btn {
      background: #4f854b;
      color: white;
      height: 50px;
      width: 130px;
    }

    .card {
      background: var(--color-bg-card);
      border-radius: 16px;
      padding: 0 1rem 1rem 1rem;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(20, 1, 26, 0.3);
      position: relative;
      overflow: hidden;
      border-left: 20px solid transparent;
      border: solid #542150 1px;
    }

    .card.new-entry {
      animation: fadeIn 0.3s ease;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 0 0.25rem;
    }

    .card-header h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
      word-break: break-word;
    }

    .collapse-btn {
      /*border: 1px solid rgba(255,255,255,0.12);*/
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff3a;
      border-radius: 999px;
      width: 36px;
      font-size: 20px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      padding-left: 10px;
      padding-top: -5px;
      line-height: 0;
      /*box-shadow: 0px 0px 20px 1px rgb(153, 88, 155);*/
    }

    .collapse-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .card-body {
      transition: max-height 0.25s ease, opacity 0.25s ease;
      overflow: hidden;
    }

    .card.collapsed .card-body {
      display: none;
    }

    /* gestapelte (vertikale) Zeitstempel */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.6rem;
      margin-top: 0.5rem;
    }

    .grid-item {
      background: var(--grid-item-bg);
      border-radius: 12px;
      padding: 0.6rem;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
      min-width: 0;
      overflow: hidden;
    }

    .field-info {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      gap: 0.3rem;
      align-items: flex-start;
    }

    .label {
      font-size: 0.8rem;
      opacity: 0.8;
      max-width: 120px;
      white-space: nowrap;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .value {
      font-size: 0.9rem;
      opacity: 0.95;
      flex: 1;
      text-align: left;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .action-buttons {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .bottom-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-start;
      align-items: center;
      margin-top: 10px;
    }

    .grid button {
      margin: 0;
      padding: 0.4rem 0.5rem;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: auto;
      height: 40px;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--entry-color, rgba(255, 255, 255, 0.08));
      color: rgb(255, 255, 255);
      font-weight: 900;
      border: #3d3d3d solid 1px;
    }

    .timestamp-btn .btn-inner {
      translate: 0 2px;
    }

    .edit-btn .btn-inner {
      translate: 0 -3px;
    }

    .add-entry-btn .btn-inner {
      translate: 0 -1px;
      scale: 3;
      font-weight: 1;
      color: rgb(255, 255, 255);
    }

    .edit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-entry-btn {
      display: flex;
      width: 50px;
      height: 100%;
      border-radius: 10px;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-card);
      border: solid #542150 1px;
    }

    textarea {
      width: 100%;
      border-radius: 12px;
      padding: 0.8rem;
      box-sizing: border-box;
      resize: none;
      overflow: hidden;
      font-size: 0.8rem;
      line-height: 1.8;
      outline: 2px solid transparent;
      min-height: 100px;
    }

    textarea:focus {
      outline-offset: 2px;
      animation: wobble 0.35s ease;
    }

    input:focus {
      outline-offset: 2px;
      animation: wobble 0.35s ease;
    }

    .value.typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      max-width: 0;
      border-right: 2px solid rgb(255, 255, 255);
      animation: typewriter 0.8s steps(30, end) forwards;
    }

    @keyframes typewriter {
      from {
        max-width: 0;
      }

      to {
        max-width: 100%;
      }
    }

    @keyframes wobble {
      0% {
        transform: translateY(0);
      }

      25% {
        transform: translateY(-4px);
      }

      50% {
        transform: translateY(4px);
      }

      75% {
        transform: translateY(-2px);
      }

      100% {
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    #home-btn {
      position: fixed;
      bottom: 10px;
      right: 40px;
      width: 50px;
      height: 50px;
      border-radius: 30px;
      background: rgb(190, 112, 21);
      color: rgba(255, 255, 255, 0.356);
      font-size: 32px;
      cursor: pointer;
      border: none;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s ease;
      pointer-events: none;
      line-height: -100.00px;
    }

    #home-btn.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
      pointer-events: auto;
    }

    #icon-scaler {
      display: inline-block;
      transform: scale(1.0);
      translate: 0 -7px;
    }

    .dialog-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s ease;
      z-index: 2000;
    }

    .dialog-backdrop.visible {
      opacity: 1;
      visibility: visible;
    }

    .dialog-box {
      background: #222;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 1.25rem;
      margin: 2rem;
      width: min(420px, calc(100% - 2rem));
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    .dialog-title {
      font-size: 1rem;
      margin-bottom: 0.75rem;
      color: #f5f5f5;
    }

    .dialog-message {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 1rem;
      min-height: 1.2rem;
    }

    .dialog-input {
      width: 80%;
      margin-bottom: 1rem;
      padding: 0.75rem 0.85rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: var(--bg-text-area);
      color: #f5f5f5;
      display: none;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }

    .dialog-actions button {
      min-width: 96px;
      border-radius: 12px;
      padding: 0.7rem 0.9rem;
      background: rgba(255, 255, 255, 0.08);
      color: #f5f5f5;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .dialog-actions button:hover {
      background: rgba(255, 255, 255, 0.12);
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <h1 style="font-size: 30px; color:rgb(207, 204, 187); filter: blur(0px);">⏱<br>
      <span style="color:rgb(177, 31, 177)">Service</span> App<br></h1> <!--⏱-->
    <div class="view-select">
      <!-- <label for="viewMode">Ansicht</label-->
      <select id="viewMode">
        <option value="active">Tickets in Bearbeitung</option>
        <option value="archive">Ticket Archiv</option>
      </select>
    </div>
  </div>

  <div class="input-row">
    <input id="nameInput" placeholder="Neue Ticket-Notiz anlegen..." autofocus />
    <button type="button" class="add-entry-btn" onclick="addEntry()"><span class="btn-inner">+</span></button>
  </div>

  <div id="list"></div>

  <div id="dialog" class="dialog-backdrop hidden">
    <div class="dialog-box">
      <div class="dialog-title"></div>
      <div class="dialog-message"></div>
      <input class="dialog-input" type="text" />
      <div class="dialog-actions">
        <button type="button" class="dialog-cancel">Abbrechen</button>
        <button type="button" class="dialog-confirm">OK</button>
      </div>
    </div>
  </div>

  <script>
    const fields = ["Abfahrt Zentrale", "Ankunft Kunde", "Fertigstellung", "Ankunft Zentrale"];

    const load = () => JSON.parse(localStorage.getItem("entries") || "[]");
    const save = d => localStorage.setItem("entries", JSON.stringify(d));
    const now = () => new Date().toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'medium' });

    const loadNextColor = () => localStorage.getItem("nextColor");
    const saveNextColor = color => localStorage.setItem("nextColor", color);

    const colorVars = [
      '--ticket_color-1',
      '--ticket_color-2',
      '--ticket_color-3',
      '--ticket_color-4',
      '--ticket_color-5',
      '--ticket_color-6',
      '--ticket_color-7',
      '--ticket_color-8',
    ];
    const colors = colorVars.map(v => getComputedStyle(document.documentElement).getPropertyValue(v).trim());
    let colorIndex = 0;
    let lastWritten = null;
    let lastCreated = null;

    function getUsedEntryColors() {
      return new Set(load().map(entry => entry.color).filter(Boolean));
    }

    function randColor() {
      const color = colors[colorIndex % colors.length];
      colorIndex++;
      return color;
    }

    function getNextColor() {
      const used = getUsedEntryColors();
      for (let i = 0; i < colors.length; i++) {
        const color = colors[(colorIndex + i) % colors.length];
        if (!used.has(color)) {
          colorIndex = (colorIndex + i + 1) % colors.length;
          return color;
        }
      }
      return randColor();
    }

    let nextColor = loadNextColor();
    let viewMode = localStorage.getItem("viewMode") || "active";
    if (!nextColor || getUsedEntryColors().has(nextColor)) {
      nextColor = getNextColor();
      saveNextColor(nextColor);
    }

    const nameInput = document.getElementById('nameInput');
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addEntry();
      }
    });

    nameInput.addEventListener('focus', () => {
      nameInput.style.outline = `2px solid ${nextColor}`;
    });

    nameInput.addEventListener('blur', () => {
      nameInput.style.outline = '2px solid transparent';
    });

    const viewModeSelect = document.getElementById('viewMode');
    viewModeSelect.value = viewMode;
    viewModeSelect.addEventListener('change', (e) => {
      viewMode = e.target.value;
      localStorage.setItem('viewMode', viewMode);
      render();
    });

    const dialogBackdrop = document.getElementById('dialog');
    const dialogTitle = dialogBackdrop.querySelector('.dialog-title');
    const dialogMessage = dialogBackdrop.querySelector('.dialog-message');
    const dialogInput = dialogBackdrop.querySelector('.dialog-input');
    const dialogConfirm = dialogBackdrop.querySelector('.dialog-confirm');
    const dialogCancel = dialogBackdrop.querySelector('.dialog-cancel');

    function openDialog({ title = '', message = '', defaultValue = '', placeholder = '', confirmText = 'OK', cancelText = 'Abbrechen', withInput = false }) {
      dialogTitle.textContent = title;
      dialogMessage.textContent = message;
      dialogInput.value = defaultValue;
      dialogInput.placeholder = placeholder;
      dialogInput.style.display = withInput ? 'block' : 'none';
      dialogConfirm.textContent = confirmText;
      dialogCancel.textContent = cancelText;
      dialogBackdrop.classList.remove('hidden');
      dialogBackdrop.classList.add('visible');

      return new Promise((resolve) => {
        const handleKeydown = (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            dialogConfirm.click();
          }
          if (e.key === 'Escape') {
            e.preventDefault();
            dialogCancel.click();
          }
        };

        const cleanup = () => {
          dialogBackdrop.classList.add('hidden');
          dialogBackdrop.classList.remove('visible');
          dialogConfirm.onclick = null;
          dialogCancel.onclick = null;
          dialogBackdrop.onclick = null;
          dialogInput.removeEventListener('keydown', handleKeydown);
        };

        dialogConfirm.onclick = () => {
          cleanup();
          resolve(withInput ? dialogInput.value : true);
        };

        dialogCancel.onclick = () => {
          cleanup();
          resolve(withInput ? null : false);
        };

        dialogBackdrop.onclick = (e) => {
          if (e.target === dialogBackdrop) {
            cleanup();
            resolve(withInput ? null : false);
          }
        };

        if (withInput) {
          dialogInput.addEventListener('keydown', handleKeydown);
          setTimeout(() => dialogInput.focus(), 0);
        }
      });
    }

    function showConfirm(message, confirmText = 'OK', cancelText = 'Abbrechen') {
      return openDialog({ title: '', message, confirmText, cancelText, withInput: false });
    }

    function showPrompt(title, defaultValue = '', placeholder = '', confirmText = 'Speichern', cancelText = 'Abbrechen') {
      return openDialog({ title, message: '', defaultValue, placeholder, confirmText, cancelText, withInput: true });
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    }

    function addEntry() {
      const name = nameInput.value.trim();
      if (!name) return;

      const data = load();
      const entry = { name, times: {}, notes: "", color: nextColor };
      fields.forEach(f => entry.times[f] = null);
      data.push(entry);

      lastCreated = data.length - 1;
      nextColor = getNextColor();
      saveNextColor(nextColor);
      save(data);
      nameInput.value = "";
      render();
    }

    async function deleteEntry(i) {
      const confirmed = await showConfirm("Eintrag entgültig löschen?", "Löschen", "Abbrechen");
      if (!confirmed) return;
      const data = load();
      data.splice(i, 1);
      save(data);
      render();
    }

    async function archiveEntry(i) {
      const data = load();
      const isArchived = data[i].archived;
      const confirmed = await showConfirm(
        isArchived ? "Eintrag wiederherstellen?" : "Eintrag archivieren?",
        isArchived ? "Wiederherstellen" : "Archivieren",
        "Abbrechen"
      );
      if (!confirmed) return;
      data[i].archived = !isArchived;
      save(data);
      render();
    }

    function setTime(i, field) {
      const data = load();
      data[i].times[field] = now();
      save(data);
      lastWritten = { index: i, field };
      render();
    }

    async function editTime(i, field) {
      const data = load();
      const current = data[i].times[field] || "";
      const val = await showPrompt("Zeiteintrag bearbeiten:", current, "Zeit eintragen");
      if (val !== null) {
        data[i].times[field] = val;
        save(data);
        render();
      }
    }

    function render() {
      const previousScroll = window.scrollY;
      list.innerHTML = "";

      const data = load();
      let changed = false;

      data.forEach((entry, i) => {
        if (viewMode === 'archive' ? !entry.archived : entry.archived) return;

        if (!entry.color) {
          entry.color = randColor();
          changed = true;
        }
        if (entry.collapsed === undefined) {
          entry.collapsed = false;
          changed = true;
        }

        const card = document.createElement("div");
        card.className = "card";
        if (entry.collapsed) card.classList.add('collapsed');
        if (lastCreated === i) {
          card.classList.add('new-entry');
        }
        card.style.borderLeft = `5px solid ${entry.color}`;
        //card.style.boxShadow = `5px 0px 50px 1px ${entry.color}`; //rob
        card.style.setProperty('--entry-color', entry.color);

        const header = document.createElement("div");
        header.className = "card-header";

        const title = document.createElement("h2");
        title.textContent = entry.name;
        title.style.color = entry.color;
        header.appendChild(title);

        const collapseBtn = document.createElement("button");
        collapseBtn.type = 'button';
        collapseBtn.className = 'collapse-btn';
        collapseBtn.style.color = entry.color;
        collapseBtn.title = entry.collapsed ? 'Expandieren' : 'Reduzieren';
        collapseBtn.textContent = entry.collapsed ? '🠋' : '🠊';
        collapseBtn.onclick = () => {
          const d = load();
          d[i].collapsed = !d[i].collapsed;
          save(d);
          render();
        };
        header.appendChild(collapseBtn);
        card.appendChild(header);

        const body = document.createElement("div");
        body.className = "card-body";

        const grid = document.createElement("div");
        grid.className = "grid";

        fields.forEach(f => {
          const item = document.createElement("div");
          item.className = "grid-item";

          const info = document.createElement("div");
          info.className = "field-info";

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = f;

          const value = document.createElement("span");
          value.className = "value";
          value.textContent = entry.times[f] || "-";

          if (lastWritten && lastWritten.index === i && lastWritten.field === f && entry.times[f]) {
            value.classList.add('typing');
            value.addEventListener('animationend', () => value.classList.remove('typing'), { once: true });
          }

          info.appendChild(label);
          info.appendChild(value);

          const actions = document.createElement("div");
          actions.className = "action-buttons";

          const timeBtn = document.createElement("button");
          timeBtn.type = 'button';
          timeBtn.className = "timestamp-btn";
          timeBtn.title = "Zeit eintragen";
          timeBtn.onclick = () => setTime(i, f);
          const timeInner = document.createElement("span");
          timeInner.className = "btn-inner";
          timeInner.textContent = "⏱";
          timeBtn.appendChild(timeInner);

          const editBtn = document.createElement("button");
          editBtn.type = 'button';
          editBtn.className = "edit-btn";
          editBtn.title = "Zeit bearbeiten";
          editBtn.onclick = () => editTime(i, f);
          const editInner = document.createElement("span");
          editInner.className = "btn-inner";
          editInner.textContent = "...";
          editBtn.appendChild(editInner);

          actions.appendChild(timeBtn);
          actions.appendChild(editBtn);

          item.appendChild(info);
          item.appendChild(actions);
          grid.appendChild(item);
        });

        body.appendChild(grid);

        const notesInput = document.createElement("textarea");
        notesInput.spellcheck = false;
        notesInput.placeholder = "Arbeiten, SN, INV, Probleme, ...";
        //notesInput.style.color = entry.color;
        notesInput.value = entry.notes || "";

        notesInput.addEventListener("focus", () => {
          //notesInput.style.background = `rgb(150, 150, 130)`;
          //notesInput.style.color = `${entry.color}`;
        });

        notesInput.addEventListener("blur", () => {
          notesInput.style.outline = '2px solid transparent';
        });

        notesInput.addEventListener("input", (e) => {
          autoResize(e.target);
          const d = load();
          d[i].notes = e.target.value;
          save(d);
        });

        setTimeout(() => autoResize(notesInput), 0);
        body.appendChild(notesInput);

        const archive = document.createElement("button");
        archive.type = 'button';
        archive.className = "archive-btn";
        archive.onclick = () => archiveEntry(i);
        const archiveInner = document.createElement("span");
        archiveInner.className = "btn-inner";
        archiveInner.textContent = entry.archived ? "Wiederherstellen" : "Archivieren";
        archive.appendChild(archiveInner);

        const del = document.createElement("button");
        del.type = 'button';
        del.className = "delete-btn";
        del.onclick = () => deleteEntry(i);
        const delInner = document.createElement("span");
        delInner.className = "btn-inner";
        delInner.textContent = "🗑";
        del.appendChild(delInner);

        const bottomActions = document.createElement("div");
        bottomActions.className = "bottom-actions";

        bottomActions.appendChild(archive);
        bottomActions.appendChild(del);

        body.appendChild(bottomActions);

        card.appendChild(body);
        list.appendChild(card);
      });

      if (changed) save(data);

      if (lastCreated !== null) {
        const newCard = list.querySelector('.card.new-entry');
        if (newCard) {
          newCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          nameInput.style.outline = `2px solid ${nextColor}`;
        }
        lastCreated = null;
      } else {
        window.scrollTo({ top: previousScroll });
      }

      lastWritten = null;
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('scroll', () => {
      const homeBtn = document.getElementById('home-btn');
      if (window.scrollY > 100) {
        homeBtn.classList.add('visible');
      } else {
        homeBtn.classList.remove('visible');
      }
    });

    render();
  </script>

  <button id="home-btn" onclick="scrollToTop()">
    <div id=icon-scaler>▲</div>
  </button>

</body>

</html>
