<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeitstempel Manager</title>

  <style>
    :root {
      --color-bg-main:#121216;
      --color-bg-card:#1e1f26;
      --color-bg-input:#2a2b33;

      --color-text-primary:#e5e7eb;

      --color-accent-primary:#a78bfa;
      --color-accent-secondary:#f9a8d4;

      --color-danger:#fb7185;
    }

    body {
      margin:0;
      font-family: system-ui;
      background: var(--color-bg-main);
      color: var(--color-text-primary);
      padding:1rem;
    }

    h1 { text-align:center; }

    .input-row {
      display:flex;
      gap:0.5rem;
      margin-bottom:1rem;
    }

    input {
      flex:1;
      padding:0.6rem;
      border-radius:10px;
      border:none;
      background:var(--color-bg-input);
      color:white;
      font-size:16px;
    }

    button {
      border:none;
      border-radius:10px;
      padding:0.5rem 0.7rem;
      cursor:pointer;
      background: linear-gradient(135deg, var(--color-accent-primary), var(--color-accent-secondary));
      color:white;
    }

    .delete-btn {
      background: var(--color-danger);
      width:30%;
      margin: 0 auto 0;
      display:block;
    }

    .card {
      background: var(--color-bg-card);
      border-radius:16px;
      padding:1rem;
      margin-bottom:1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      animation: fadeIn 0.3s ease;
    }

    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:0.6rem;
      margin-top:0.5rem;
    }

    .grid-item {
      background: rgba(255,255,255,0.03);
      border-radius:12px;
      padding:0.6rem;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .label {
      font-size:0.7rem;
      opacity:0.7;
    }

    .value {
      font-size:0.9rem;
    }

    .grid button {
      align-self:flex-end;
      margin-top:4px;
    }

    textarea {
      width:100%;
      margin:1rem 0;
      border-radius:12px;
      border:none;
      padding:0.6rem;
      background: var(--color-bg-input);
      color: var(--color-text-primary);
      box-sizing: border-box;
      resize:none;
      overflow:hidden;
      font-size:16px;
      line-height: 1.8;
    }

    textarea:focus {
      outline: 2px solid var(--color-accent-primary);
    }

    @keyframes fadeIn {
      from {opacity:0; transform:translateY(10px)}
      to {opacity:1; transform:translateY(0)}
    }
  </style>
</head>

<body>
  <h1>⏱ Zeitstempel</h1>

  <div class="input-row">
    <input id="nameInput" placeholder="Neuer Eintrag..." />
    <button onclick="addEntry()">＋</button>
  </div>

  <div id="list"></div>

  <script>
    const fields = ["Abfahrt","Ankunft","Fertigstellung","Einsatz-Ende"];

    const load = () => JSON.parse(localStorage.getItem("entries") || "[]");
    const save = d => localStorage.setItem("entries", JSON.stringify(d));
    const now = () => new Date().toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'medium' });

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    }

    function addEntry() {
      const name = nameInput.value.trim();
      if (!name) return;

      const data = load();
      const entry = { name, times:{}, notes:"" };
      fields.forEach(f => entry.times[f] = null);
      data.push(entry);

      save(data);
      nameInput.value="";
      render();
    }

    function deleteEntry(i) {
      const data = load();
      if (!confirm("Eintrag löschen?")) return;
      data.splice(i,1);
      save(data);
      render();
    }

    function setTime(i, field) {
      const data = load();

      if (!data[i].times[field]) {
        data[i].times[field] = now();
      } else {
        const val = prompt("Bearbeiten:", data[i].times[field]);
        if (val !== null) data[i].times[field] = val;
      }

      save(data);
      render();
    }

    function render() {
      list.innerHTML = "";

      load().forEach((entry, i) => {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("h3");
        title.textContent = entry.name;
        card.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "grid";

        fields.forEach(f => {
          const item = document.createElement("div");
          item.className = "grid-item";

          const label = document.createElement("span");
          label.className = "label";
          label.textContent = f;

          const value = document.createElement("span");
          value.className = "value";
          value.textContent = entry.times[f] || "-";

          const btn = document.createElement("button");
          btn.textContent = entry.times[f] ? "✏️" : "⏱";
          btn.onclick = () => setTime(i,f);

          item.appendChild(label);
          item.appendChild(value);
          item.appendChild(btn);
          grid.appendChild(item);
        });

        card.appendChild(grid);

        const notesInput = document.createElement("textarea");
        notesInput.placeholder = "Arbeiten / Notizen...";
        notesInput.value = entry.notes || "";

        notesInput.addEventListener("input", (e) => {
          autoResize(e.target);
          const data = load();
          data[i].notes = e.target.value;
          save(data);
        });

        setTimeout(() => autoResize(notesInput), 0);

        card.appendChild(notesInput);

        const del = document.createElement("button");
        del.textContent = "🗑 Löschen";
        del.className = "delete-btn";
        del.onclick = () => deleteEntry(i);

        card.appendChild(del);
        list.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
